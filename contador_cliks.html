<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador de Cliks</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --fg: #f0ece2;
      --accent: #ff4d1c;
      --muted: #2a2a2a;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      position: fixed;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: transform 0.05s;
      z-index: 9999;
      mix-blend-mode: difference;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,77,28,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,77,28,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      position: relative;
    }

    .label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .counter-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(120px, 25vw, 280px);
      line-height: 0.85;
      letter-spacing: -0.02em;
      color: var(--fg);
      user-select: none;
      position: relative;
      transition: transform 0.05s;
    }

    .counter-display.bump {
      transform: scale(1.04);
    }

    /* Red shadow echo */
    .counter-display::after {
      content: attr(data-val);
      position: absolute;
      inset: 0;
      color: var(--accent);
      transform: translate(4px, 4px);
      z-index: -1;
      opacity: 0.5;
      font-family: 'Bebas Neue', sans-serif;
    }

    .controls {
      display: flex;
      gap: 16px;
      margin-top: 40px;
    }

    button {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      padding: 14px 32px;
      cursor: none;
      transition: all 0.12s;
      position: relative;
    }

    .btn-click {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .btn-click:hover {
      background: #ff6b45;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #7a1e00;
    }

    .btn-click:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #7a1e00;
    }

    .btn-reset {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--muted);
    }

    .btn-reset:hover {
      border-color: var(--fg);
      background: var(--muted);
    }

    .btn-reset:active {
      opacity: 0.7;
    }

    .stats {
      margin-top: 28px;
      display: flex;
      gap: 40px;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #555;
    }

    .stats span strong {
      display: block;
      font-size: 1.1rem;
      color: var(--fg);
      letter-spacing: 0;
      font-weight: 700;
    }

    /* Ripple */
    .ripple {
      position: fixed;
      border-radius: 50%;
      border: 2px solid var(--accent);
      pointer-events: none;
      animation: ripple-out 0.5s ease-out forwards;
      transform: translate(-50%, -50%);
    }

    @keyframes ripple-out {
      from { width: 0; height: 0; opacity: 0.8; }
      to   { width: 100px; height: 100px; opacity: 0; }
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 8px 0 16px;
      opacity: 0.4;
    }
  </style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="wrapper">
  <div class="label">// contador de cliks</div>
  <div class="divider"></div>
  <div class="counter-display" id="count" data-val="0">0</div>

  <div class="controls">
    <button class="btn-click" id="clickBtn">¡ CLIK !</button>
    <button class="btn-reset" id="resetBtn">Reset</button>
  </div>

  <div class="stats">
    <span>Máximo <strong id="maxStat">0</strong></span>
    <span>Por seg <strong id="rateStat">0.0</strong></span>
    <span>Sesión <strong id="sessionStat">0s</strong></span>
  </div>
</div>

<script>
  let count = 0;
  let maxCount = 0;
  let startTime = null;
  const countEl = document.getElementById('count');
  const clickBtn = document.getElementById('clickBtn');
  const resetBtn = document.getElementById('resetBtn');
  const maxStat = document.getElementById('maxStat');
  const rateStat = document.getElementById('rateStat');
  const sessionStat = document.getElementById('sessionStat');
  const cursor = document.getElementById('cursor');

  // Custom cursor
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
  });

  function updateDisplay() {
    countEl.textContent = count;
    countEl.setAttribute('data-val', count);
    if (count > maxCount) { maxCount = count; maxStat.textContent = maxCount; }

    // Bump animation
    countEl.classList.remove('bump');
    void countEl.offsetWidth;
    countEl.classList.add('bump');
    setTimeout(() => countEl.classList.remove('bump'), 120);
  }

  function spawnRipple(x, y) {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    document.body.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  }

  clickBtn.addEventListener('click', e => {
    if (!startTime) startTime = Date.now();
    count++;
    updateDisplay();
    spawnRipple(e.clientX, e.clientY);
  });

  resetBtn.addEventListener('click', () => {
    count = 0;
    startTime = null;
    countEl.textContent = '0';
    countEl.setAttribute('data-val', '0');
    rateStat.textContent = '0.0';
    sessionStat.textContent = '0s';
  });

  // Stats ticker
  setInterval(() => {
    if (startTime && count > 0) {
      const elapsed = (Date.now() - startTime) / 1000;
      rateStat.textContent = (count / elapsed).toFixed(1);
      sessionStat.textContent = Math.floor(elapsed) + 's';
    }
  }, 300);

  // Keyboard support
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') {
      e.preventDefault();
      clickBtn.click();
    }
    if (e.code === 'KeyR') resetBtn.click();
  });
</script>
</body>
</html>
